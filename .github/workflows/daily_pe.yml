name: PE Monitor Daily

on:
  schedule:
    - cron: '55 0 * * 1-5'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PE Monitor
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          WECHAT_SCTKEY: ${{ secrets.WECHAT_SCTKEY }}
          NOTIFY_MODE: ${{ secrets.NOTIFY_MODE || 'full' }}
        run: python pe_monitor.py

      - name: Commit data
        run: |
          git config user.name "PE Monitor Bot"
          git config user.email "pe-monitor[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "🔄 Update PE data $(date -u +%Y-%m-%d)"
          git push || true    
